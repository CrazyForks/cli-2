name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  check:
    name: Verify tag and package
    runs-on: ubuntu-latest
    outputs:
      dist-tag: ${{ steps.version.outputs.dist-tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      # Pre-release versions (1.2.3-rc.1) publish under the `next` dist-tag
      # so `npm i -g @wdl-dev/cli` keeps resolving to the last stable release.
      - name: Tag must match package.json version
        id: version
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match package version v${version}" >&2
            exit 1
          fi
          case "$version" in
            *-*) echo "dist-tag=next" >> "$GITHUB_OUTPUT" ;;
            *) echo "dist-tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - run: npm pack --dry-run

  publish-npmjs:
    name: Publish to npmjs
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: trusted-publishing auth + provenance attestation
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5; Node 22 ships npm 10.
      - run: npm install -g npm@latest

      # Tokenless: auth is OIDC trusted publishing, configured on npmjs for
      # this repo + release.yml. --ignore-scripts because the check job already
      # gated this commit (prepublishOnly guards manual publishes, not CI), and
      # the tarball packs from the files allowlist with no build step.
      - run: npm publish --ignore-scripts --provenance --access public --tag "$NPM_DIST_TAG"
        env:
          NPM_DIST_TAG: ${{ needs.check.outputs.dist-tag }}

  publish-github:
    name: Publish to GitHub Packages
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@wdl-dev"

      - run: npm publish --ignore-scripts --tag "$NPM_DIST_TAG"
        env:
          NPM_DIST_TAG: ${{ needs.check.outputs.dist-tag }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [check, publish-npmjs, publish-github]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      # Final releases take their notes from the matching CHANGELOG.md
      # section; pre-releases (x.y.z-rc.N) have no section and fall back to
      # generated notes, marked Pre-release so they never show as Latest.
      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 == "## " ver { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          args=(--verify-tag)
          if [ -s /tmp/notes.md ]; then
            args+=(--notes-file /tmp/notes.md)
          else
            args+=(--generate-notes)
          fi
          case "$version" in
            *-*) args+=(--prerelease) ;;
          esac
          gh release create "$GITHUB_REF_NAME" "${args[@]}"
